spring.config.import=db.yml, optional:file:.env[.properties]
server.port=8080

openai.api.key=${OPENAI_API_KEY:test}
openai.model1=${OPENAI_MODEL1:test}
openai.model2=${OPENAI_MODEL2:test}
openai.api.url=${OPENAI_API_URL:http://localhost}
openai.api.url2=${OPENAI_API_URL2:http://localhost}
openai.api.url.image=${OPENAI_API_URL_IMAGE:http://localhost}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ncp
ncp.sms.phoneNumber=${NCP_SMS_PHONE_NUMBER:01000000000}
ncp.sms.accessKey=${NCP_SMS_ACCESS_KEY:test}
ncp.sms.secretKey=${NCP_SMS_SECRET_KEY:test}
ncp.sms.serviceId=${NCP_SMS_SERVICE_ID:test}

# AWS S3
cloud.aws.s3.bucket=${AWS_BUCKET_NAME:test-bucket}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:test}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:test}
cloud.aws.s3.base-url=https://s3.ap-northeast-2.amazonaws.com
cloud.aws.region.static=ap-northeast-2
cloud.aws.region.auto=false
cloud.aws.stack.auto=false

jwt.secret=${JWT_SECRET:testsecretkey12345testsecretkey12345testsecretkey12345testsecretkey12345}
jwt.access-expiration=3600000
jwt.refresh-expiration=86400000

spring.main.allow-bean-definition-overriding=true
spring.application.name=debug
spring.jackson.serialization.write-dates-as-timestamps=false
